<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NH라인 수발주앱 시안</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 모바일 앱처럼 보이기 위한 컨테이너 스타일 */
        body { background-color: #f3f4f6; display: flex; justify-content: center; font-family: 'Pretendard', sans-serif; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        /* NH 시그니처 체크박스 (상품 선택용) */
        .nh-check-input { display: none; }
        .nh-check-label { display: inline-block; width: 26px; height: 26px; background-image: url('https://oneapp2.godohosting.com/order_guide/chk1.png'); background-size: contain; background-position: center; background-repeat: no-repeat; cursor: pointer; transition: opacity 0.2s; }
        .nh-check-input:checked + .nh-check-label { background-image: url('https://oneapp2.godohosting.com/order_guide/chk2.png'); }

        /* 텍스트 래핑 설정: 말줄임표 없이 자연스럽게 줄바꿈 */
        .product-title-container {
            word-break: keep-all; /* 단어 단위로 끊기지 않게 설정 */
            overflow-wrap: break-word;
            line-height: 1.4;
        }
        
        .product-spec {
            display: inline; /* 기본적으로 인라인으로 유지하여 공간 있으면 옆에 붙음 */
            color: #6b7280; /* 회색(gray-500) */
            font-weight: 400;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header: NH라인 정중앙 정렬 -->
    <header class="relative flex justify-between items-center p-4 border-b">
        <button class="text-gray-600 text-xl z-10"><i class="fas fa-bars"></i></button>
        <h1 class="absolute left-0 right-0 text-center text-2xl font-bold text-green-700 tracking-tighter pointer-events-none">NH라인</h1>
        <div class="text-sm font-semibold flex items-center z-10">
            25,400P <i class="fas fa-user ml-2 text-gray-500"></i>
        </div>
    </header>

    <!-- Sub Header -->
    <div class="flex justify-between items-center p-4 border-b border-gray-100">
        <div class="flex items-center text-lg font-bold cursor-pointer active:opacity-50 transition-opacity" id="back-btn">
            <i class="fas fa-chevron-left mr-2"></i> <span id="page-title-text">상품 검색 결과</span>
        </div>
        
        <button id="view-toggle-btn" class="text-[12px] font-medium text-gray-700 bg-white border border-gray-300 rounded px-3 py-1.5 shadow-sm active:bg-gray-100 transition-colors flex items-center">
            <span id="view-toggle-text">판매준비중 상품</span>
        </button>
    </div>

    <!-- Product List -->
    <div class="flex flex-col">
        <div id="normal-product-list">
            
            <!-- 1. 긴 제목 사례: 공간이 부족하면 규격만 자연스럽게 줄바꿈됨 -->
            <div class="flex items-start p-4 border-b border-gray-100">
                <div class="w-20 h-20 bg-gray-200 rounded mr-4 flex-shrink-0 flex items-center justify-center overflow-hidden">
                    <img src="https://via.placeholder.com/80?text=Fish" alt="갈치" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow pt-0.5">
                    <div class="text-[15px] font-bold text-gray-800 product-title-container">
                        갈치80/100g(남아공)벌크 <span class="product-spec">BOX (10kg)</span>
                    </div>
                    <div class="text-lg font-bold text-green-700 mt-1">88,900원</div>
                </div>
                <div class="flex-shrink-0 pt-1 ml-2">
                    <input type="checkbox" id="item_long" class="nh-check-input" checked>
                    <label for="item_long" class="nh-check-label"></label>
                </div>
            </div>

            <!-- 2. 짧은 제목 사례: 규격이 한 줄에 그대로 붙음 -->
            <div class="flex items-start p-4 border-b border-gray-100">
                <div class="w-20 h-20 bg-gray-200 rounded mr-4 flex-shrink-0 flex items-center justify-center overflow-hidden">
                    <img src="https://via.placeholder.com/80?text=Anchovy" alt="지리멸치" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow pt-0.5">
                    <div class="text-[15px] font-bold text-gray-800 product-title-container">
                        지리멸치(국내산) <span class="product-spec">1.5kg</span>
                    </div>
                    <div class="text-lg font-bold text-green-700 mt-1">33,500원</div>
                </div>
                <div class="flex-shrink-0 pt-1 ml-2">
                    <input type="checkbox" id="item1" class="nh-check-input">
                    <label for="item1" class="nh-check-label"></label>
                </div>
            </div>

            <!-- 3. 중간 길이 사례: 유동적인 줄바꿈 확인 -->
            <div class="flex items-start p-4 border-b border-gray-100">
                <div class="w-20 h-20 bg-gray-200 rounded mr-4 flex-shrink-0 flex items-center justify-center overflow-hidden">
                    <img src="https://via.placeholder.com/80?text=Flatfish" alt="가자미" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow pt-0.5">
                    <div class="text-[15px] font-bold text-gray-800 product-title-container">
                        손질가자미200/300(러시아) <span class="product-spec">4.5kg</span>
                    </div>
                    <div class="text-lg font-bold text-green-700 mt-1">29,200원</div>
                </div>
                <div class="flex-shrink-0 pt-1 ml-2">
                    <input type="checkbox" id="item2" class="nh-check-input">
                    <label for="item2" class="nh-check-label"></label>
                </div>
            </div>

        </div>

        <!-- 판매준비중 상품 영역 -->
        <div id="suspended-product-list" class="hidden bg-gray-50 min-h-[400px]">
            <div class="p-3 text-[13px] text-gray-500 text-center border-b border-gray-200 bg-gray-100 leading-relaxed">
                현재 판매가 일시 중단된 상품입니다.<br>필요하신 경우 <strong>문의하시면 입고 가능 여부를 안내해드립니다.</strong>
            </div>
            
            <div class="items-start p-4 border-b border-gray-200 flex bg-white">
                <div class="w-20 h-20 bg-gray-200 rounded mr-4 flex-shrink-0 flex items-center justify-center overflow-hidden relative">
                    <img src="https://via.placeholder.com/80?text=Suspended" alt="디포리" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                        <span class="text-white text-xs font-bold border border-white px-1.5 py-0.5 rounded">준비중</span>
                    </div>
                </div>
                <div class="flex-grow pt-0.5">
                    <div class="text-[15px] font-bold text-gray-600 product-title-container">디포리(육수용/특품) <span class="product-spec">1.5kg</span></div>
                    <div class="text-lg font-bold text-green-700 mt-1">28,200원</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 w-full max-w-[480px] bg-white border-t flex items-center p-2 z-50">
        <button class="flex-1 flex flex-col items-center justify-center text-gray-500 pb-1">
            <i class="fas fa-search text-xl mb-1"></i>
            <span class="text-[10px]">검색</span>
        </button>
        <button class="flex-[3] bg-white border-2 border-green-600 text-black rounded-lg py-2 flex flex-col items-center justify-center mx-2 shadow-sm">
            <span class="text-[10px] text-green-600 font-bold mb-0.5 tracking-wider">ORDERZ</span>
            <span class="text-sm font-bold">주문하러 가기</span>
        </button>
        <button class="flex-1 flex flex-col items-center justify-center text-gray-500 pb-1">
            <i class="far fa-comment-dots text-xl mb-1"></i>
            <span class="text-[10px]">문의</span>
        </button>
    </div>
</div>

<script>
    const viewToggleBtn = document.getElementById('view-toggle-btn');
    const backBtn = document.getElementById('back-btn');
    const normalList = document.getElementById('normal-product-list');
    const suspendedList = document.getElementById('suspended-product-list');
    const pageTitleText = document.getElementById('page-title-text');

    let isShowingSuspended = false;

    viewToggleBtn.addEventListener('click', function() {
        isShowingSuspended = true;
        normalList.classList.add('hidden');
        suspendedList.classList.remove('hidden');
        pageTitleText.innerText = '판매준비중 상품';
        viewToggleBtn.classList.add('hidden');
    });

    backBtn.addEventListener('click', function() {
        if(isShowingSuspended) {
            isShowingSuspended = false;
            normalList.classList.remove('hidden');
            suspendedList.classList.add('hidden');
            pageTitleText.innerText = '상품 검색 결과';
            viewToggleBtn.classList.remove('hidden');
        } else {
            // 실제 앱에서는 뒤로가기 동작 수행
        }
    });
</script>

</body>
</html>
